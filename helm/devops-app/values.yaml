replicaCount: 1

image:
  repository: ghcr.io/manubarrionuevo/devops-academy-app
  tag: "0a61a21"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

containerPort: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

serviceMonitor:
  enabled: true
  interval: 15s

app:
  env: dev
